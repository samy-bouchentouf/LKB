<!--
Components page.

Displays technical documentation and
laboratory component information.
-->

<section class="w-full flex-1 overflow-y-auto p-6 max-w-6xl mx-auto space-y-6">

    <!-- Page Header -->

    <div class="border-b border-stone-200 pb-4">

        <h2 class="text-2xl font-bold text-stone-800">
            Components
        </h2>

        <p class="text-sm text-stone-500 mt-1">
            Browse, upload and manage technical documentation
            for laboratory equipment and components.
        </p>

    </div>

    <!-- Upload Area -->

    <div
        id="document-dropzone"
        class="bg-white border-2 border-dashed border-stone-200 hover:border-sky-300 rounded-2xl p-10 text-center transition-all cursor-pointer"
    >

        <div class="max-w-md mx-auto">

            <div class="text-4xl mb-4">
                🔧
            </div>

            <h3 class="text-lg font-semibold text-stone-700">
                Drop a technical document here
            </h3>

            <p class="text-sm text-stone-400 mt-2">
                Supported formats: PDF, DOCX, TXT and Markdown
            </p>

        </div>

    </div>

    <!-- Search Area -->

    <div class="bg-white rounded-2xl border border-stone-200 p-5 shadow-sm">

        <div class="flex flex-col md:flex-row gap-4">

            <input
                id="document-search"
                type="text"
                placeholder="Search components..."
                class="flex-1 border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-sky-300"
            >

            <select
                id="document-sort"
                class="border border-stone-200 rounded-xl px-4 py-3 text-sm"
            >

                <option value="newest">
                    Newest First
                </option>

                <option value="oldest">
                    Oldest First
                </option>

                <option value="az">
                    Name A-Z
                </option>

                <option value="za">
                    Name Z-A
                </option>

            </select>

        </div>

    </div>

    <!-- Results Header -->

    <div class="flex items-center justify-between">

        <h3 class="text-lg font-semibold text-stone-800">
            Component Library
        </h3>

        <span
            id="documents-count"
            class="text-sm text-stone-500"
        >
            --
        </span>

    </div>

    <!-- Components Grid -->

    <div
        id="documents-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"
    >
    </div>

</section>
