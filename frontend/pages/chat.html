<!--
Chat page.

Provides the interface used to interact
with the LKB documentation chatbot.
-->

<section class="h-full flex flex-col bg-stone-50">

    <!-- Empty State -->

    <div id="chat-welcome"
        class="flex-1 flex items-center justify-center px-6">

        <div class="w-full max-w-4xl text-center -mt-28 scale-140">

            <h1 class="text-4xl font-bold text-stone-800 mb-4 text-center">
                LKB Documentation Assistant
            </h1>

            <p class="text-stone-500 text-center max-w-2xl mx-auto mb-10">
                Search publications, technical documents,
                diagrams and incident reports from the
                laboratory knowledge base.
            </p>

            <div class="w-full max-w-3xl mx-auto">

                <div class="flex items-center bg-white border border-stone-200 rounded-3xl shadow-sm px-4 py-3">

                    <input
                        type="text"
                        id="chat-input"
                        placeholder="Ask a question about the knowledge base..."
                        class="flex-1 outline-none bg-transparent text-stone-700"
                    >

                    <button
                        id="send-button"
                        class="bg-[#2E5CB8] text-white px-4 py-2 rounded-2xl font-medium hover:bg-blue-700 transition-colors"
                    >
                        Ask
                    </button>

                </div>

            </div>
        
        </div>

    </div>

    <!-- Conversation Area -->

    <div id="chat-conversation"
         class="hidden flex-1 overflow-y-auto p-6">
    </div>

</section>
