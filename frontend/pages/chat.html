<!--
Chat page.

Provides the interface used to interact
with the LKB documentation chatbot and
manage persistent conversations.
-->

<section
    id="chat-shell"
    class="relative h-full flex bg-stone-50 overflow-hidden"
>

    <!-- Sidebar -->

    <aside
        id="chat-sidebar"
        class="w-72 flex flex-col border-r border-stone-200 bg-white shrink-0"
    >

        <div
            id="conversations-list"
            class="flex-1 overflow-y-auto p-2"
        >

            <div
                id="new-chat-button"
                class="px-3 py-2 rounded-xl cursor-pointer text-sm bg-stone-100 text-stone-900 font-medium mb-1"
            >
                New Chat
            </div>

            <!-- Conversations injected by chat.js -->

        </div>

    </aside>

    <button
        id="sidebar-toggle"
        class="
            absolute
            left-80
            z-30
            w-8
            h-12
            bg-white
            border
            border-stone-200
            rounded-r-xl
            shadow-sm
            flex
            items-center
            justify-center
            text-lg
            hover:bg-stone-50
            transition-all
        "
        title="Toggle conversations"
    >
        ←
    </button>

    <!-- Main Chat Area -->

    <div class="flex-1 flex flex-col min-w-0">

        <!-- Welcome State -->

        <div
            id="chat-welcome"
            class="flex-1 flex items-center justify-center px-6"
        >

            <div class="w-full max-w-4xl text-center -mt-28 scale-140">

                <h1 class="text-4xl font-bold text-stone-800 mb-4">
                    LKB Documentation Assistant
                </h1>

                <p class="text-stone-500 max-w-2xl mx-auto mb-10">
                    Search publications, technical documents,
                    diagrams and incident reports from the
                    laboratory knowledge base.
                </p>

                <!-- Composer inserted here while in welcome mode -->

                <div id="welcome-composer-anchor"></div>

            </div>

        </div>

        <!-- Conversation Area -->

        <div
            id="chat-conversation"
            class="hidden flex-1 overflow-y-auto p-6"
        >
        </div>

        <!-- Composer -->

        <div
            id="chat-composer"
            class="border-t border-stone-200 p-4"
        >

            <div class="max-w-5xl mx-auto">

                <div class="flex items-center bg-white border border-stone-200 rounded-3xl shadow-sm px-4 py-3">

                    <input
                        type="text"
                        id="chat-input"
                        placeholder="Ask a question about the knowledge base..."
                        class="flex-1 outline-none bg-transparent text-stone-700"
                    >

                    <button
                        id="send-button"
                        class="bg-[#2E5CB8] text-white px-4 py-2 rounded-2xl font-medium hover:bg-blue-700 transition-colors"
                    >
                        Ask
                    </button>

                </div>

            </div>

        </div>

    </div>

</section>
