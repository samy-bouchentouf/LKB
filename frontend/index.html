<!--
Frontend entry point.

Defines the global application layout
and loads shared frontend resources.
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LKB AI Hub</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <link rel="stylesheet" href="assets/css/main.css">
</head>

<body class="bg-stone-50 flex flex-col h-screen w-screen overflow-hidden font-sans m-0 p-0">

    <!-- Header -->

    <header class="bg-[#FDFBF7] border-b border-stone-200/80 shadow-sm z-20 w-full flex-shrink-0">

        <div class="w-full px-6 h-16 flex items-center justify-between">

            <!-- Logo -->

            <div
                class="cursor-pointer flex-shrink-0"
                onclick="loadPage('home')"
            >
                <div class="flex flex-col border-l border-stone-200 pl-3">

                    <h1 class="text-lg font-bold text-stone-800 flex items-center gap-3">

                        <img
                            src="assets/images/lkb.png"
                            alt="LKB"
                            class="h-8 object-contain"
                        >

                        <div class="flex flex-col border-l border-stone-200 pl-3">

                            <span class="text-stone-800 font-bold tracking-tight text-xl">
                                LKB Lab
                            </span>

                            <span class="text-xs text-stone-400 tracking-wider uppercase font-semibold">
                                Quantum Physics
                            </span>

                        </div>

                    </h1>

                </div>
            </div>

            <!-- Navigation -->

            <nav class="hidden md:flex items-center justify-end gap-8 flex-1">

                <button
                    id="nav-home"
                    onclick="loadPage('home')"
                    class="nav-button"
                >
                    Home
                </button>

                <button
                    id="nav-chat"
                    onclick="loadPage('chat')"
                    class="nav-button"
                >
                    Chat
                </button>

                <button
                    id="nav-publications"
                    onclick="loadPage('publications')"
                    class="nav-button"
                >
                    Publications
                </button>

                <button
                    id="nav-components"
                    onclick="loadPage('components')"
                    class="nav-button"
                >
                    Components
                </button>

                <button
                    id="nav-diagrams"
                    onclick="loadPage('diagrams')"
                    class="nav-button"
                >
                    Diagrams
                </button>

                <button
                    id="nav-incidents"
                    onclick="loadPage('incidents')"
                    class="nav-button"
                >
                    Incidents
                </button>

            </nav>

        </div>

    </header>

    <!-- Main Content -->

    <main class="flex-1 overflow-y-auto">

        <div
            id="page-container"
            class="h-full"
        >

            <!-- Pages will be loaded here -->

        </div>

    </main>

    <!-- File Conflict Modal -->

    <div
        id="file-conflict-modal"
        class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50"
    >

        <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-md mx-4">

            <h3 class="text-lg font-semibold text-stone-800">
                File Conflict
            </h3>

            <p
                id="file-conflict-message"
                class="mt-3 text-sm text-stone-600"
            >
            </p>

            <div
                id="file-conflict-rename-section"
                class="hidden mt-4"
            >

                <label
                    class="block text-sm font-medium text-stone-700 mb-2"
                >
                    New Name
                </label>

                <input
                    id="file-conflict-new-name"
                    type="text"
                    class="w-full border border-stone-200 rounded-xl px-3 py-2"
                >

            </div>

            <div
                class="flex justify-end gap-2 mt-6"
            >

                <button
                    id="file-conflict-cancel"
                    class="px-4 py-2 rounded-xl bg-stone-100 text-stone-700"
                >
                    Cancel
                </button>

                <button
                    id="file-conflict-rename"
                    class="px-4 py-2 rounded-xl bg-amber-50 text-amber-700"
                >
                    Rename
                </button>

                <button
                    id="file-conflict-overwrite"
                    class="px-4 py-2 rounded-xl bg-red-50 text-red-700"
                >
                    Overwrite
                </button>

            </div>

        </div>

    </div>
    
    <!-- Footer -->
    <script src="assets/js/home.js"></script>
    <script src="assets/js/chat.js"></script>
    <script src="assets/js/documents.js"></script>
    <script src="assets/js/diagrams.js"></script>
    <script src="assets/js/incidents.js"></script>
    <script src="assets/js/navigation.js"></script>
    <script src="assets/js/main.js"></script>

</body>

</html>
